# Site settings
title: "Daily LLM Prompts"
description: "100 new prompts every day for marketing, legal, medical, engineering, creative, business, education, personal, research, and multi-perspective thinking."
baseurl: "/promptgeneratorprojx"
url: "https://LD1878.github.io"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections - THIS IS THE CRITICAL PART
collections:
  prompts:
    output: true
    permalink: /:collection/:path/

# Default front matter
defaults:
  - scope:
      path: ""
      type: prompts
    values:
      layout: prompt
      permalink: /:categories/:title/  # Alternative URL structure

# Include these files in build
include:
  - sitemap.xml
  - robots.txt
