# Site settings
title: "Daily LLM Prompts"
description: "100 new prompts every day for marketing, personal, sales, research, and ideas."
baseurl: "/promptgeneratorprojx"   # Important: your repo name
url: "https://LD1878.github.io"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  prompts:
    output: true
    permalink: /:collection/:path/

# Default front matter for prompts
defaults:
  - scope:
      path: ""
      type: prompts
    values:
      layout: prompt
