# Site settings
title: "Daily LLM Prompts"
description: "100 new prompts every day for marketing, legal, medical, engineering, creative, business, education, personal, research, and multi-perspective thinking."
baseurl: "/promptgeneratorprojx"
url: "https://LD1878.github.io"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  prompts:
    output: true
    permalink: /:collection/:title/   # This creates URLs like /prompts/title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: prompts
    values:
      layout: prompt
      # No permalink here – we let the collection setting handle it
