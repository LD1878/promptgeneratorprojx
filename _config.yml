# Site settings
title: "Daily LLM Prompts"
description: "100 new prompts every day for marketing, legal, medical, engineering, creative, business, education, personal, research, and multi-perspective thinking."
baseurl: "/promptgeneratorprojx"
url: "https://LD1878.github.io"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections – ONLY PERMALINK HERE
collections:
  prompts:
    output: true
    permalink: /:categories/:title/   # This creates URLs like /creative/title/

# Default front matter – NO PERMALINK HERE
defaults:
  - scope:
      path: ""
      type: prompts
    values:
      layout: prompt
      # Do NOT add a permalink line here!
